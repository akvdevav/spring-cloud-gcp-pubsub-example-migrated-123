name: Java CI
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with: {java-version: '21', distribution: 'temurin'}
    - name: Build Validation
      run: |
          set -e
          echo 'Building module: .'
          gradle build -x test
